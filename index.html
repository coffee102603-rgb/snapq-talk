// ── TTS: Samsung Galaxy Android Fix ──
let voicesReady = false;
let retryCount = 0;

function loadVoices() {
  if (!window.speechSynthesis) return;
  const v = window.speechSynthesis.getVoices();
  if (v.length > 0) { voicesReady = true; return; }
  if (retryCount < 10) {
    retryCount++;
    setTimeout(loadVoices, 200);
  }
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => { voicesReady = true; };
  loadVoices();
}

function say(t, l="en-US", r=0.85) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    
    const doSpeak = () => {
      const u = new SpeechSynthesisUtterance(t);
      u.lang = l;
      u.rate = r;
      u.volume = 1;
      // Find matching voice (critical for Samsung)
      const voices = window.speechSynthesis.getVoices();
      const langCode = l.split("-")[0];
      const exactMatch = voices.find(v => v.lang === l);
      const partialMatch = voices.find(v => v.lang.startsWith(langCode));
      if (exactMatch) u.voice = exactMatch;
      else if (partialMatch) u.voice = partialMatch;
      
      u.onend = resolve;
      u.onerror = resolve;
      // Samsung fix: sometimes speak doesn't fire, timeout fallback
      const timeout = setTimeout(resolve, Math.max(3000, t.length * 150));
      u.onend = () => { clearTimeout(timeout); resolve(); };
      u.onerror = () => { clearTimeout(timeout); resolve(); };
      
      window.speechSynthesis.speak(u);
      
      // Samsung Chrome bug: speech pauses after ~15sec, this keeps it alive
      const keepAlive = setInterval(() => {
        if (!window.speechSynthesis.speaking) { clearInterval(keepAlive); return; }
        window.speechSynthesis.pause();
        window.speechSynthesis.resume();
      }, 10000);
      u.onend = () => { clearInterval(keepAlive); clearTimeout(timeout); resolve(); };
    };
    
    // Wait for voices if not ready
    if (!voicesReady && window.speechSynthesis.getVoices().length === 0) {
      setTimeout(doSpeak, 500);
    } else {
      doSpeak();
    }
  });
}

// Audio activation (must be called from user gesture)
function activateAudio() {
  if (!window.speechSynthesis) return;
  // Force voice loading
  window.speechSynthesis.getVoices();
  // Speak empty to unlock audio
  const u = new SpeechSynthesisUtterance(".");
  u.volume = 0.01;
  u.rate = 10;
  window.speechSynthesis.speak(u);
  // Try again after short delay
  setTimeout(() => {
    window.speechSynthesis.getVoices();
    voicesReady = true;
  }, 300);
}

// Puzzle helper
const DIST=["always","never","very","much","going","been","could","should","their","about","after","before","still","just","also","more","some","make","want","need"];
function mkPuz(sent,lvl){const w=sent.split(/\s+/);const g=[];if(lvl===1)for(let i=0;i<Math.ceil(w.length*.6);i++)g.push(i);if(lvl===2)w.forEach((_,i)=>{if(i%3===0)g.push(i)});if(lvl===3)g.push(0);
const bl=w.map((x,i)=>g.includes(i)?x:null);const tp=w.filter((_,i)=>!g.includes(i));const ds=[...DIST].sort(()=>Math.random()-.5).filter(d=>!w.map(x=>x.toLowerCase()).includes(d.toLowerCase())).slice(0,Math.min(2,Math.max(1,Math.floor(tp.length*.3))));
return{blanks:bl,bank:[...tp,...ds].sort(()=>Math.random()-.5),total:w.length}}
function chk(a,b){const c=s=>s.toLowerCase().replace(/[^a-z0-9\s]/g,"").trim();const x=c(a).split(/\s+/),y=c(b).split(/\s+/);if(!x[0])return 0;let m=0;y.forEach(w=>{if(x.includes(w))m++});return m/y.length}

// Director feedback — compares spoken vs target, gives specific corrections (0 tokens!)
function directorNG(spoken,target){
  const cln=s=>s.toLowerCase().replace(/[^a-z0-9'\s]/g,"").trim();
  const sW=cln(spoken).split(/\s+/),tW=cln(target).split(/\s+/);
  const tips=[];
  // Find missing words
  const missing=tW.filter(w=>!sW.includes(w));
  const extra=sW.filter(w=>!tW.includes(w));
  if(missing.length>0)tips.push({type:"missing",msg:`빠진 단어: "${missing.join(", ")}"`,fix:`이 단어들을 넣어보세요!`});
  // Word order check
  if(missing.length===0&&extra.length===0&&sW.join(" ")!==tW.join(" "))tips.push({type:"order",msg:"단어 순서가 조금 달라요",fix:"순서를 다시 확인해보세요!"});
  // Common grammar mistakes
  if(spoken.includes(" is ")&&target.includes(" are "))tips.push({type:"grammar",msg:'"is" → "are"',fix:"복수 주어엔 are를 써야 해요!"});
  if(spoken.includes(" are ")&&target.includes(" is "))tips.push({type:"grammar",msg:'"are" → "is"',fix:"단수 주어엔 is를 써야 해요!"});
  if(!spoken.toLowerCase().includes("please")&&target.toLowerCase().includes("please"))tips.push({type:"polite",msg:'"please"를 빼먹었어요',fix:"공손한 표현을 추가하면 더 자연스러워요!"});
  // Plural check
  tW.forEach(w=>{if(w.endsWith("s")&&sW.includes(w.slice(0,-1)))tips.push({type:"plural",msg:`"${w.slice(0,-1)}" → "${w}"`,fix:"복수형을 확인하세요!"})});
  if(tips.length===0&&missing.length===0)tips.push({type:"good",msg:"거의 완벽해요!",fix:"억양과 발음에 집중해보세요."});
  return tips;
}

        :<button onClick={()=>{if(recRef.current)recRef.current.stop();if(mediaRecRef.current&&mediaRecRef.current.state==="recording")mediaRecRef.current.stop();setSpkId(null);setTimerOn(false)}} style={{...S.btn,background:"rgba(239,68,68,0.12)",color:"#fca5a5"}}>🔴 {u.record}</button>}
        {!isR&&rev<1&&<button onClick={()=>{setRev(1);setPeeks(c=>c+1);setHp(h=>h-1)}} style={{...S.btn,...S.btnH}}>💡-❤️</button>}
        {!isR&&rev===1&&<button onClick={()=>{setRev(2);setPeeks(c=>c+1)}} style={{...S.btn,...S.btnH}}>🔤</button>}
      </>}
    </div>
    <button onClick={nextLine} style={{...S.nBtn,background:`linear-gradient(135deg,${sc.gColor},${sc.gColor}bb)`}}>{li<dl.length-1?u.next:`🎬 ${u.cut}`}</button>
    </div>
  </div>)}

  // ═══ RESULT ═══
  if(ph===PH.RESULT){const myRO=sc.roles.find(r=>r.id===myR);const myLn=hist.filter(h=>h.speaker===myR);const passed=myLn.filter(h=>h.ms>=0.4).length;
  return(<div style={S.pg}><style>{CSS}</style><Nav all/>
    <div style={{textAlign:"center",padding:"12px 0 6px"}}><div style={{fontSize:40}}>🎬</div><h2 style={{fontSize:18,fontWeight:900,color:"#fff",margin:"4px 0"}}>{u.done}</h2>
      <p style={{fontSize:11,color:"#94a3b8"}}>{sc.title} — {myRO.emoji} {myRO.name}</p></div>
    <div style={S.resC}>
      <div style={S.resS}><span>✅ 통과</span><span style={{fontWeight:700,color:"#4ade80"}}>{passed}/{myLn.length}</span></div>
      <div style={S.resS}><span>🔥 콤보</span><span style={{fontWeight:700,color:"#f59e0b"}}>{maxC}</span></div>
      <div style={S.resS}><span>⭐ XP</span><span style={{fontWeight:700,color:"#fff"}}>{xp}</span></div>
      <div style={S.resS}><span>💄 단어</span><span style={{fontWeight:700,color:"#ec4899"}}>{vl.length}</span></div>
    </div>
    {mastery.length>0&&<div style={{display:"flex",gap:6,margin:"6px 0"}}>
      {["green","yellow","red"].map(g=><div key={g} style={{flex:1,textAlign:"center",padding:5,borderRadius:6,background:`rgba(255,255,255,0.03)`}}>
        <div style={{fontSize:14}}>{g==="green"?"🟢":g==="yellow"?"🟡":"🔴"}</div>
        <div style={{fontSize:14,fontWeight:800,color:g==="green"?"#4ade80":g==="yellow"?"#fbbf24":"#ef4444"}}>{mastery.filter(m=>m.grade===g).length}</div>
      </div>)}
    </div>}
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
      <button onClick={()=>setPh(PH.SCRIPT)} style={{...S.resBtn,background:"rgba(139,92,246,0.12)"}}>📖 대본</button>
      <button onClick={()=>setPh(PH.DRESS)} style={{...S.resBtn,background:"rgba(236,72,153,0.12)"}}>💄 분장실</button>
      <button onClick={()=>reset(PH.REHEARSAL)} style={{...S.resBtn,background:"rgba(59,130,246,0.1)"}}>🎭 리허설</button>
      <button onClick={()=>reset(PH.ACTION)} style={{...S.resBtn,background:`${sc.gColor}12`}}>🎬 재촬영</button>
    </div>
    <button onClick={()=>setPh(PH.STUDIO)} style={{...S.nBtn,background:"rgba(255,255,255,0.04)",marginTop:6,color:"#94a3b8"}}>🎬 스튜디오</button>
  </div>)}

  // ═══ PRO LISTENING ═══
  if(ph===PH.PRO_LISTEN){const pl=sc.proListening;const isPres=proPhase==="pres";
    const text=isPres?(pl.pres[tK]||pl.pres.en):(pl.ques[tK]||pl.ques.en);
    const textHint=isPres?(pl.pres[nK]||pl.pres.ko):(pl.ques[nK]||pl.ques.ko);
    const plTitle=pl.title[nK]||pl.title.ko;
  return(<div style={S.pg}><style>{CSS}</style><Nav all/>
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"rgba(59,130,246,0.08)",borderRadius:8,marginBottom:8}}>
      <span style={{fontSize:9,fontWeight:700,color:"#3b82f6",letterSpacing:1}}>{isPres?"🎤":"❓"}</span>
      <span style={{fontSize:10,color:"#94a3b8"}}>{plTitle}</span></div>
    <div style={{position:"relative",width:"100%",height:130,borderRadius:10,overflow:"hidden",marginBottom:6,background:isPres?"linear-gradient(180deg,#0f1020,#1a1a3e)":"linear-gradient(180deg,#1a0a0a,#2e1515)",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid rgba(255,255,255,0.05)"}}>
      <div style={{textAlign:"center"}}><span style={{fontSize:36}}>{isPres?"🎤":"🙋"}</span>
        <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{isPres?"발표자":"청중이 질문"}</div>
        {playing&&<div style={{display:"flex",gap:2,justifyContent:"center",marginTop:4,height:18,alignItems:"flex-end"}}>
          {[0,1,2,3,4].map(i=><div key={i} style={{width:3,borderRadius:2,background:sc.gColor,animation:`sb 0.4s ${i*0.08}s ease-in-out infinite alternate`}}/>)}</div>}
      </div></div>
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"rgba(255,255,255,0.03)",borderRadius:7,marginBottom:6}}>
      <button onClick={()=>setSpeed(s=>Math.max(0.5,s-0.1))} style={S.spBtn}>🐢</button>
      <span style={{fontSize:11,color:"#fff",fontWeight:700}}>×{speed.toFixed(1)}</span>
      <button onClick={()=>setSpeed(s=>Math.min(1.2,s+0.1))} style={S.spBtn}>🐇</button>
      <span style={{fontSize:9,color:"#475569",marginLeft:"auto"}}>리플레이: {replays}회</span></div>
    {showSc&&<div style={S.scriptBox}><p style={{fontSize:12,color:"#fff",lineHeight:1.5,margin:"0 0 4px"}}>{text}</p><p style={{fontSize:10,color:"#64748b",margin:0}}>{textHint}</p></div>}
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <button disabled={playing} onClick={async()=>{setPlay(true);await say(text,tL,speed);setPlay(false);setReplays(c=>c+1)}} style={{...S.nBtn,background:`linear-gradient(135deg,${sc.gColor},${sc.gColor}bb)`,opacity:playing?0.5:1}}>{playing?"🔊 재생중...":replays===0?"🔊 들어보세요":"🔄 다시 듣기"}</button>
      {replays>0&&!showSc&&<button onClick={()=>{setShowSc(true);if(pl.vocab)setVl(v=>{const n=[...v];pl.vocab.forEach(x=>{if(!n.includes(x))n.push(x)});return n})}} style={{...S.nBtn,background:"rgba(255,255,255,0.05)",color:"#94a3b8"}}>👀 스크립트 (포기)</button>}
      {replays>0&&<button onClick={()=>{if(isPres){setProPhase("question");setReplays(0);setShowSc(false)}else{setPqIdx(0);setPqSel(null);setPqRes(null);setPqAnswers([]);setPh(PH.PRO_QUIZ)}}} style={{...S.nBtn,background:"rgba(74,222,128,0.12)",color:"#4ade80"}}>{isPres?"알아들었어요! → 질문":"알아들었어요! → 퀴즈"}</button>}
    </div>
  </div>)}

  // ═══ PRO QUIZ ═══
  if(ph===PH.PRO_QUIZ){const pl=sc.proListening;const qData=pl.quiz[pqIdx];
    const qText=qData.q[nK]||qData.q.ko;const qOpts=qData.opts[nK]||qData.opts.ko;
  return(<div style={S.pg}><style>{CSS}</style><Nav all/>
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"rgba(139,92,246,0.08)",borderRadius:7,marginBottom:8}}>
      <span style={{fontSize:9,fontWeight:700,color:"#8b5cf6"}}>📝</span><span style={{fontSize:10,color:"#94a3b8"}}>{pqIdx+1}/{pl.quiz.length}</span></div>
    <div style={S.drillCard}><p style={{fontSize:14,fontWeight:600,color:"#fff",margin:"0 0 10px"}}>{qText}</p>
      {qOpts.map((opt,i)=>{const isSel=pqSel===i;const isOk=pqRes!==null&&i===qData.ans;const isWr=pqRes!==null&&isSel&&i!==qData.ans;
        return(<button key={i} onClick={()=>{if(pqRes!==null)return;setPqSel(i);setPqRes(i===qData.ans?"pass":"fail");setPqAnswers(a=>[...a,{pass:i===qData.ans}])}}
          style={{display:"block",width:"100%",padding:"10px 12px",marginBottom:6,borderRadius:8,border:"1px solid",fontSize:12,fontWeight:500,cursor:"pointer",textAlign:"left",fontFamily:F,
            background:isOk?"rgba(74,222,128,0.12)":isWr?"rgba(239,68,68,0.12)":"rgba(255,255,255,0.03)",
            borderColor:isOk?"rgba(74,222,128,0.3)":isWr?"rgba(239,68,68,0.3)":"rgba(255,255,255,0.08)",
            color:isOk?"#4ade80":isWr?"#ef4444":"#e2e8f0"}}>{isOk?"✅ ":""}{isWr?"❌ ":""}{opt}</button>)})}
    </div>
    {pqRes&&<div style={{marginTop:6}}>
      <button onClick={()=>{if(pqIdx<pl.quiz.length-1){setPqIdx(c=>c+1);setPqSel(null);setPqRes(null)}else setPh(PH.PRO_RESULT)}} style={{...S.nBtn,background:`linear-gradient(135deg,${sc.gColor},${sc.gColor}bb)`}}>{pqIdx<pl.quiz.length-1?"다음 →":"📊 결과"}</button>
      {pqRes==="fail"&&<button onClick={()=>{setProPhase("pres");setReplays(0);setShowSc(false);setPh(PH.PRO_LISTEN)}} style={{...S.nBtn,background:"rgba(255,255,255,0.05)",color:"#94a3b8",marginTop:4}}>🔄 다시 듣기</button>}
    </div>}
  </div>)}

  // ═══ PRO RESULT ═══
  if(ph===PH.PRO_RESULT){const pl=sc.proListening;const correct=pqAnswers.filter(a=>a.pass).length;const plTitle2=pl.title[nK]||pl.title.ko;
  return(<div style={S.pg}><style>{CSS}</style><Nav all/>
    <div style={{textAlign:"center",padding:"14px 0 8px"}}><div style={{fontSize:40}}>🎧</div><h2 style={{fontSize:18,fontWeight:900,color:"#fff",margin:"4px 0"}}>{u.done}</h2>
      <p style={{fontSize:11,color:"#94a3b8"}}>{sc.genre} — {plTitle2}</p></div>
    <div style={S.resC}>
      <div style={S.resS}><span>📝 퀴즈</span><span style={{fontWeight:700,color:correct===pl.quiz.length?"#4ade80":"#fbbf24"}}>{correct}/{pl.quiz.length}</span></div>
      <div style={S.resS}><span>🔄 리플레이</span><span style={{fontWeight:700,color:"#fff"}}>{replays}회</span></div>
      <div style={S.resS}><span>💄 단어</span><span style={{fontWeight:700,color:"#ec4899"}}>{vl.length}</span></div>
    </div>
    {pl.vocab&&<div style={{display:"flex",flexWrap:"wrap",gap:4,margin:"6px 0"}}>
      {pl.vocab.map((v,i)=>{const p=v.split(":");return<div key={i} style={{padding:"3px 6px",borderRadius:5,background:"rgba(255,255,255,0.04)",fontSize:10}}>
        <span style={{fontWeight:600,color:"#fff"}}>{p[0]}</span><span style={{color:"#64748b",marginLeft:3}}>{p[1]}</span></div>})}
    </div>}
    <div style={{display:"flex",gap:5,marginTop:8}}>
      <button onClick={()=>{setProPhase("pres");setReplays(0);setShowSc(false);setPqIdx(0);setPqSel(null);setPqRes(null);setPqAnswers([]);setPh(PH.PRO_LISTEN)}} style={{...S.resBtn,background:"rgba(59,130,246,0.12)"}}>🔄 다시</button>
      <button onClick={()=>setPh(PH.ROLE)} style={{...S.resBtn,background:"rgba(139,92,246,0.12)"}}>🎭 배역</button>
      <button onClick={()=>setPh(PH.STUDIO)} style={{...S.resBtn,background:"rgba(255,255,255,0.05)"}}>🎬 스튜디오</button>
    </div>
  </div>)}

  return null;
}

const CSS=`@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .4s ease both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cb{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes sb{from{height:3px}to{height:16px}}
@keyframes flicker{0%,100%{opacity:.03}50%{opacity:.06}}`;
const N={bar:{display:"flex",alignItems:"center",gap:3,padding:"4px 0 6px",borderBottom:"1px solid rgba(255,255,255,0.04)",marginBottom:6},
  btn:{display:"flex",alignItems:"center",gap:2,background:"none",border:"none",color:"#94a3b8",cursor:"pointer",padding:"3px 6px",borderRadius:5,fontSize:9,fontFamily:F},
  t:{fontSize:9,fontWeight:600}};
const S={
  pg:{maxWidth:480,margin:"0 auto",minHeight:"100vh",padding:"8px 12px 70px",fontFamily:F,background:"#06060c",color:"#e2e8f0"},
  introW:{position:"relative",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"},
  grain:{position:"fixed",inset:0,background:"repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0px,transparent 2px)",pointerEvents:"none",animation:"flicker 3s infinite",zIndex:1},
  lT:{position:"fixed",top:0,left:0,right:0,height:28,background:"#000",zIndex:2},lB:{position:"fixed",bottom:0,left:0,right:0,height:28,background:"#000",zIndex:2},
  logo:{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:900,background:"linear-gradient(135deg,#f59e0b,#ef4444,#f59e0b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"4px 0"},
  introBtn:{marginTop:8,padding:"11px 24px",borderRadius:10,border:"1px solid rgba(245,158,11,.3)",background:"rgba(245,158,11,.1)",color:"#f59e0b",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:F},
  bk:{background:"none",border:"none",color:"#f59e0b",fontSize:11,cursor:"pointer",padding:"4px 0",fontFamily:F},
  natCard:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"12px 4px",background:"rgba(255,255,255,.02)",border:"1px solid",borderRadius:12,cursor:"pointer",color:"#e2e8f0"},
  destCard:{display:"flex",alignItems:"center",gap:10,padding:"14px",background:"rgba(255,255,255,.02)",border:"1px solid",borderRadius:12,cursor:"pointer",color:"#e2e8f0"},
  card:{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:10},
  tabBtn:{flex:1,padding:"8px",borderRadius:8,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F},
  scCard:{display:"block",width:"100%",background:"rgba(255,255,255,.02)",border:"1px solid",borderRadius:11,padding:10,textAlign:"left",cursor:"pointer",color:"#e2e8f0"},
  gTag:{display:"inline-block",padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:800,color:"#06060c"},
  roleBtn:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"rgba(255,255,255,.03)",border:"1px solid",borderRadius:10,cursor:"pointer",color:"#e2e8f0",width:"100%"},
  cover:{textAlign:"center",padding:"10px",margin:"2px 0 6px",background:"rgba(255,255,255,.02)",border:"1px solid",borderRadius:10},
  sLine:{padding:"5px 7px",marginBottom:3,borderLeft:"2px solid",borderRadius:"0 5px 5px 0",background:"rgba(255,255,255,.02)"},
  mini:{background:"rgba(96,165,250,.1)",border:"none",color:"#60a5fa",fontSize:9,padding:"1px 4px",borderRadius:3,cursor:"pointer",marginLeft:"auto"},
  drillCard:{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:10},
  panel:{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.05)",borderRadius:12,padding:10},
  btn:{flex:1,padding:"8px 3px",borderRadius:7,border:"none",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:F},
  btnL:{background:"rgba(96,165,250,.12)",color:"#93c5fd"},btnH:{background:"rgba(255,255,255,.04)",color:"#64748b"},
  nBtn:{width:"100%",padding:"10px",borderRadius:8,border:"none",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:F},
  resC:{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.05)",borderRadius:10,padding:10,margin:"6px 0"},
  resS:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.03)",fontSize:11,color:"#94a3b8"},
  resBtn:{flex:1,padding:"9px",borderRadius:8,border:"none",color:"#e2e8f0",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:F},
  scriptBox:{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:8,padding:10,marginBottom:6},
  spBtn:{padding:"3px 8px",borderRadius:5,background:"rgba(255,255,255,.06)",border:"none",color:"#94a3b8",fontSize:10,cursor:"pointer",fontFamily:F},
};

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
